<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graupel</title>
<script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1f1f1f;--bg4:#282828;
  --border:#2a2a2a;--border2:#333;
  --text:#e2e2e2;--text2:#888;--text3:#555;
  --accent:#7c6af7;--accent-dim:#3d3570;
  --user-bg:#1b2638;--user-border:#2a3f5a;
  --tool-bg:#1a1a2e;--tool-border:#2a2a4a;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px}
body{background:var(--bg);color:var(--text);display:flex;height:100vh}

/* ─── Sidebar ─────────────────────────────────────────────────────────── */
#sidebar{
  width:220px;min-width:220px;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden
}
.sidebar-head{
  padding:14px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.logo{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--accent)}
.btn-new{
  background:var(--accent);color:#fff;border:none;border-radius:5px;
  padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;
  letter-spacing:.3px;transition:opacity .15s
}
.btn-new:hover{opacity:.8}
#session-list{flex:1;overflow-y:auto;padding:6px}
.session-item{
  padding:8px 10px;border-radius:6px;cursor:pointer;
  font-size:12px;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:background .1s,color .1s;margin-bottom:1px
}
.session-item:hover{background:var(--bg3);color:var(--text)}
.session-empty{padding:12px 10px;font-size:12px;color:var(--text3)}

/* ─── Chat area ───────────────────────────────────────────────────────── */
#chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--text2);gap:10px;text-align:center
}
.empty-state h2{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.empty-state p{font-size:13px}
.empty-state .btn-new{padding:9px 20px;font-size:13px;margin-top:4px}

/* ─── Chat header ─────────────────────────────────────────────────────── */
.chat-header{
  padding:12px 20px;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--text2);background:var(--bg);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0
}

/* ─── Messages ────────────────────────────────────────────────────────── */
#messages{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:18px
}
.msg-wrap{display:flex;flex-direction:column;gap:4px;max-width:780px;width:100%}
.msg-wrap.user{align-self:flex-end;align-items:flex-end}
.msg-wrap.assistant{align-self:flex-start;align-items:flex-start}
.msg-role{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:var(--text3)
}
.msg-wrap.user .msg-role{color:var(--accent)}
.msg-bubble{
  padding:10px 14px;border-radius:10px;
  font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word
}
.msg-wrap.user .msg-bubble{
  background:var(--user-bg);border:1px solid var(--user-border);
  border-radius:10px 10px 2px 10px;max-width:560px
}
.msg-wrap.assistant .msg-bubble{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px 10px 10px 2px;max-width:680px
}

/* ─── Trace ───────────────────────────────────────────────────────────── */
.trace{margin-top:6px;width:100%;max-width:680px}
details.trace-block{
  background:var(--tool-bg);border:1px solid var(--tool-border);
  border-radius:7px;overflow:hidden;margin-bottom:4px
}
summary.trace-summary{
  padding:6px 10px;cursor:pointer;font-size:11px;
  font-family:'SF Mono','Cascadia Code','Fira Code',monospace;
  color:#8080b0;display:flex;align-items:center;gap:6px;
  list-style:none;user-select:none
}
summary.trace-summary::-webkit-details-marker{display:none}
summary.trace-summary::before{
  content:'▶';font-size:9px;color:var(--accent);transition:transform .15s
}
details[open] summary.trace-summary::before{transform:rotate(90deg)}
.trace-tool{color:var(--accent);font-weight:700}
.trace-input-preview{color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.trace-body{padding:8px 10px;border-top:1px solid var(--tool-border)}
.trace-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.trace-code{
  font-family:'SF Mono','Cascadia Code','Fira Code',monospace;
  font-size:11px;color:#b0b0d0;white-space:pre-wrap;word-break:break-all;
  max-height:180px;overflow-y:auto;
  background:var(--bg);padding:6px 8px;border-radius:5px;border:1px solid var(--border)
}

/* ─── Input area ──────────────────────────────────────────────────────── */
.input-area{
  padding:14px 20px;border-top:1px solid var(--border);
  background:var(--bg);flex-shrink:0
}
#send-form{display:flex;gap:8px;align-items:flex-end;max-width:780px}
.input-box{
  flex:1;background:var(--bg2);border:1px solid var(--border2);
  border-radius:9px;color:var(--text);font-size:13px;
  padding:9px 13px;resize:none;min-height:40px;max-height:200px;
  font-family:inherit;line-height:1.5;outline:none;transition:border-color .15s
}
.input-box:focus{border-color:var(--accent-dim)}
.input-box::placeholder{color:var(--text3)}
.btn-send{
  background:var(--accent);color:#fff;border:none;border-radius:7px;
  padding:9px 15px;font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:opacity .15s;flex-shrink:0
}
.btn-send:hover{opacity:.85}
.send-hint{font-size:11px;color:var(--text3);margin-top:5px}

/* ─── Thinking bubble ─────────────────────────────────────────────────── */
.thinking-bubble{
  display:flex;align-items:center;gap:10px;
  color:var(--text2);font-size:12px;font-style:italic
}
.dots{display:flex;gap:5px}
.dots span{
  width:7px;height:7px;background:var(--accent);border-radius:50%;
  animation:bounce 1.2s ease-in-out infinite
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{opacity:.25;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* ─── Error bubble ────────────────────────────────────────────────────── */
.error-bubble{
  border-color:rgba(248,113,113,.45) !important;
  background:rgba(248,113,113,.07) !important;
  color:var(--red)
}
.is-error .msg-role{color:var(--red)}

/* disable send button while request is in flight */
#send-form.htmx-request .btn-send{opacity:.45;pointer-events:none}

/* ─── Model selector ──────────────────────────────────────────────────── */
#model-selector{
  padding:8px 8px 4px;border-bottom:1px solid var(--border)
}
.model-section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.9px;color:var(--text3);padding:0 4px 5px
}
.model-option-form{margin-bottom:2px}
.model-option{
  width:100%;background:none;border:none;border-radius:6px;
  padding:6px 8px;cursor:pointer;display:flex;align-items:center;
  gap:7px;font-size:12px;color:var(--text2);transition:background .1s,color .1s;
  text-align:left
}
.model-option:hover{background:var(--bg3);color:var(--text)}
.model-option.active{background:var(--bg3);color:var(--text)}
.model-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text3);flex-shrink:0;transition:background .2s
}
.model-dot.on{background:var(--green)}
.model-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-check{color:var(--green);font-size:11px;flex-shrink:0}
.model-none{padding:4px 4px 6px;font-size:11px}
.model-none-title{color:var(--yellow);font-weight:600;margin-bottom:4px}
.model-none-body{color:var(--text2);line-height:1.5}
.model-pull-cmds{
  margin-top:5px;display:flex;flex-direction:column;gap:3px
}
.model-pull-cmds code{
  display:block;font-family:'SF Mono','Cascadia Code','Fira Code',monospace;
  font-size:10px;background:var(--bg);border:1px solid var(--border);
  border-radius:4px;padding:3px 6px;color:#b0b0d0;
  user-select:all;cursor:text
}
/* loading shimmer while /models fetches */
#model-loading{
  padding:10px 12px;font-size:11px;color:var(--text3);
  font-style:italic
}

/* ─── Scrollbar ───────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-head">
    <span class="logo">GRAUPEL</span>
    <button class="btn-new"
      hx-post="/session/new"
      hx-target="#chat"
      hx-swap="innerHTML">+ New</button>
  </div>
  <div id="model-selector"
    hx-get="/models"
    hx-trigger="load"
    hx-swap="outerHTML">
    <div id="model-loading">Loading models…</div>
  </div>

  <div id="session-list">
    {{if .Sessions}}
      {{range .Sessions}}
      <div class="session-item"
        hx-get="/session/{{.ID}}"
        hx-target="#chat"
        hx-swap="innerHTML">{{.Title}}</div>
      {{end}}
    {{else}}
      <div class="session-empty">No sessions yet</div>
    {{end}}
  </div>
</div>

<div id="chat">
  <div class="empty-state">
    <h2>Graupel</h2>
    <p>Minimal agent harness · local LLM · filesystem tools</p>
    <button class="btn-new"
      hx-post="/session/new"
      hx-target="#chat"
      hx-swap="innerHTML">Start a new chat</button>
  </div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  if (m) m.scrollTop = m.scrollHeight;
}

// ── Auto-resize textarea ─────────────────────────────────────────────────
document.addEventListener('input', e => {
  if (e.target.classList.contains('input-box')) {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
  }
});

// ── Cmd/Ctrl+Enter submits ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    const form = e.target.closest('form');
    if (form) htmx.trigger(form, 'submit');
  }
});

// ── Optimistic user bubble + thinking placeholder ────────────────────────
// Fires before HTMX sends the request.
document.addEventListener('htmx:beforeRequest', function(e) {
  if (!e.detail.elt || e.detail.elt.id !== 'send-form') return;

  const box = e.detail.elt.querySelector('.input-box');
  const msg = box ? box.value.trim() : '';
  if (!msg) { e.preventDefault(); return; }

  const msgs = document.getElementById('messages');
  if (!msgs) return;

  // 1. User bubble — shown immediately
  msgs.insertAdjacentHTML('beforeend',
    '<div class="msg-wrap user">' +
      '<div class="msg-role">You</div>' +
      '<div class="msg-bubble">' + esc(msg) + '</div>' +
    '</div>'
  );

  // 2. Thinking placeholder — HTMX will replace this with the server response
  msgs.insertAdjacentHTML('beforeend',
    '<div id="agent-thinking" class="msg-wrap assistant">' +
      '<div class="msg-role">Agent</div>' +
      '<div class="msg-bubble thinking-bubble">' +
        '<div class="dots"><span></span><span></span><span></span></div>' +
        '<span>Thinking…</span>' +
      '</div>' +
    '</div>'
  );

  // Clear input right away
  if (box) { box.value = ''; box.style.height = 'auto'; }

  scrollToBottom();
});

// ── Scroll after assistant response lands ────────────────────────────────
document.addEventListener('htmx:afterSwap', () => scrollToBottom());

// ── Error: network failure (couldn't reach the server at all) ────────────
document.addEventListener('htmx:sendError', function(e) {
  if (!e.detail.elt || e.detail.elt.id !== 'send-form') return;
  showChatError('Could not connect to the server. Is Graupel still running?');
});

// ── Error: server returned a non-2xx status ──────────────────────────────
document.addEventListener('htmx:responseError', function(e) {
  if (!e.detail.elt || e.detail.elt.id !== 'send-form') return;
  const status = e.detail.xhr ? e.detail.xhr.status : '?';
  showChatError('Server error (' + status + '). Check the terminal for details.');
});

function showChatError(msg) {
  const el = document.getElementById('agent-thinking');
  if (el) {
    el.outerHTML =
      '<div class="msg-wrap assistant is-error">' +
        '<div class="msg-role">Error</div>' +
        '<div class="msg-bubble error-bubble">⚠ ' + esc(msg) + '</div>' +
      '</div>';
  }
  scrollToBottom();
}
</script>
</body>
</html>
